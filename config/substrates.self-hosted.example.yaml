mode: self-hosted
kubernetes:
  distribution: k3s
  appNamespace: agentsmith
  substrateNamespace: agentsmith-substrate
  skipK3s: false
  # Relative kubeconfig paths are resolved from this config file.
  kubeconfigOutput: out/kubeconfig
postgres:
  storageClass: local-path
  appDatabase: agentsmith_lite
  juicefsDatabase: juicefs_meta
objectStorage:
  provider: minio
  endpoint: http://minio.agentsmith-substrate.svc.cluster.local:9000
  region: us-east-1
  bucket: agentsmith-lite-files
juicefs:
  volumeName: agentsmith-lite-files
  secretName: agentsmith-lite-juicefs
  csiDriver: csi.juicefs.com
  storageClass: agentsmith-lite-juicefs-rwx
  pvcName: agentsmith-lite-files
  mountRoot: /agentsmith-lite
auth:
  mode: oidc
  realm: agentsmith
  clientId: agentsmith-lite
  keycloak:
    publicBaseUrl: https://keycloak.agentsmith.localhost
ingress:
  publicBaseUrl: https://agentsmith.localhost/app
  ingressClass: traefik
  tlsSecretName: agentsmith-lite-local-ingress-tls
offline:
  registry: registry.local:5000
