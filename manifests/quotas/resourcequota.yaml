apiVersion: v1
kind: ResourceQuota
metadata:
  name: agentsmith-lite-defaults
  namespace: agentsmith
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: agentsmith-lite-defaults
  namespace: agentsmith
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
