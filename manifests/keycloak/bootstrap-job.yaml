apiVersion: batch/v1
kind: Job
metadata:
  name: agentsmith-lite-keycloak-bootstrap
  namespace: ${SUBSTRATE_NAMESPACE}
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-bootstrap
    spec:
      restartPolicy: Never
      containers:
        - name: keycloak-bootstrap
          image: ${KEYCLOAK_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: adminUsername
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: adminPassword
            - name: OIDC_REALM
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: oidcRealm
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: oidcClientId
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: oidcClientSecret
            - name: OIDC_BOOTSTRAP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: oidcBootstrapUsername
            - name: OIDC_BOOTSTRAP_EMAIL
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: oidcBootstrapEmail
            - name: OIDC_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: oidcBootstrapPassword
            - name: APP_PUBLIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: appPublicBaseUrl
          command:
            - /bin/sh
            - -ceu
            - |
              : "${KEYCLOAK_ADMIN_USERNAME:?}"
              : "${KEYCLOAK_ADMIN_PASSWORD:?}"
              : "${OIDC_REALM:?}"
              : "${OIDC_CLIENT_ID:?}"
              : "${OIDC_CLIENT_SECRET:?}"
              : "${OIDC_BOOTSTRAP_USERNAME:?}"
              : "${OIDC_BOOTSTRAP_EMAIL:?}"
              : "${OIDC_BOOTSTRAP_PASSWORD:?}"
              : "${APP_PUBLIC_BASE_URL:?}"

              server="http://keycloak:8080"
              kcadm_timeout=""
              if [ -x /usr/bin/timeout ]; then
                kcadm_timeout="/usr/bin/timeout 30"
              elif command -v timeout >/dev/null 2>&1; then
                kcadm_timeout="timeout 30"
              fi
              kcadm() {
                if [ -n "$kcadm_timeout" ]; then
                  $kcadm_timeout /opt/keycloak/bin/kcadm.sh "$@"
                else
                  /opt/keycloak/bin/kcadm.sh "$@"
                fi
              }

              for i in $(seq 1 60); do
                if kcadm config credentials \
                  --server "$server" \
                  --realm master \
                  --user "$KEYCLOAK_ADMIN_USERNAME" \
                  --password "$KEYCLOAK_ADMIN_PASSWORD" >/tmp/kcadm-login.out 2>&1; then
                  break
                fi
                if [ "$i" = 60 ]; then
                  cat /tmp/kcadm-login.out >&2
                  exit 1
                fi
                sleep 5
              done

              if ! kcadm get "realms/$OIDC_REALM" >/dev/null 2>&1; then
                kcadm create realms \
                  -s "realm=$OIDC_REALM" \
                  -s enabled=true
              fi

              client_uuid="$(
                kcadm get clients \
                  -r "$OIDC_REALM" \
                  -q "clientId=$OIDC_CLIENT_ID" \
                  --fields id \
                  --format csv \
                  --noquotes 2>/dev/null
              )"
              redirect_uri="${APP_PUBLIC_BASE_URL%/}/*"
              web_origin="${APP_PUBLIC_BASE_URL%/}"
              bootstrap_email="$OIDC_BOOTSTRAP_EMAIL"
              bootstrap_first_name="Agentsmith"
              bootstrap_last_name="Local"
              if [ -z "$client_uuid" ]; then
                kcadm create clients \
                  -r "$OIDC_REALM" \
                  -s "clientId=$OIDC_CLIENT_ID" \
                  -s enabled=true \
                  -s publicClient=false \
                  -s "secret=$OIDC_CLIENT_SECRET" \
                  -s standardFlowEnabled=true \
                  -s directAccessGrantsEnabled=false \
                  -s "redirectUris=[\"$redirect_uri\"]" \
                  -s "webOrigins=[\"$web_origin\"]"
              else
                kcadm update "clients/$client_uuid" \
                  -r "$OIDC_REALM" \
                  -s enabled=true \
                  -s publicClient=false \
                  -s "secret=$OIDC_CLIENT_SECRET" \
                  -s standardFlowEnabled=true \
                  -s directAccessGrantsEnabled=false \
                  -s "redirectUris=[\"$redirect_uri\"]" \
                  -s "webOrigins=[\"$web_origin\"]"
              fi
              user_id="$(
                kcadm get users \
                  -r "$OIDC_REALM" \
                  -q exact=true \
                  -q "username=$OIDC_BOOTSTRAP_USERNAME" \
                  --fields id \
                  --format csv \
                  --noquotes 2>/dev/null
              )"
              if [ -z "$user_id" ]; then
                kcadm create users \
                  -r "$OIDC_REALM" \
                  -s "username=$OIDC_BOOTSTRAP_USERNAME" \
                  -s enabled=true \
                  -s "email=$bootstrap_email" \
                  -s emailVerified=true \
                  -s "firstName=$bootstrap_first_name" \
                  -s "lastName=$bootstrap_last_name" \
                  -s "requiredActions=[]"
                user_id="$(
                  kcadm get users \
                    -r "$OIDC_REALM" \
                    -q exact=true \
                    -q "username=$OIDC_BOOTSTRAP_USERNAME" \
                    --fields id \
                    --format csv \
                    --noquotes
                )"
              else
                kcadm update "users/$user_id" \
                  -r "$OIDC_REALM" \
                  -s enabled=true \
                  -s "email=$bootstrap_email" \
                  -s emailVerified=true \
                  -s "firstName=$bootstrap_first_name" \
                  -s "lastName=$bootstrap_last_name" \
                  -s "requiredActions=[]"
              fi
              [ -n "$user_id" ] || {
                printf 'keycloak bootstrap user lookup failed\n' >&2
                exit 1
              }
              kcadm set-password \
                -r "$OIDC_REALM" \
                --userid "$user_id" \
                --new-password "$OIDC_BOOTSTRAP_PASSWORD" \
                --temporary=false

              printf 'keycloak realm client ready; bootstrap user ready\n'
