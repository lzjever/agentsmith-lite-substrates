apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ${SUBSTRATE_NAMESPACE}
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: ${SUBSTRATE_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
    spec:
      containers:
        - name: keycloak
          image: ${KEYCLOAK_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - start-dev
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: management
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: dbJdbcUrl
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: dbUsername
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: dbPassword
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: adminUsername
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: adminPassword
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-keycloak
                  key: publicBaseUrl
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY_HEADERS
              value: xforwarded
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
${KEYCLOAK_INGRESS_BLOCK}
