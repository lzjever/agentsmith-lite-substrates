apiVersion: batch/v1
kind: Job
metadata:
  name: agentsmith-lite-juicefs-format
  namespace: ${KUBE_NAMESPACE}
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juicefs-format
    spec:
      restartPolicy: Never
      containers:
        - name: juicefs-format
          image: ${JUICEFS_CSI_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: JUICEFS_VOLUME_NAME
              valueFrom:
                secretKeyRef:
                  name: ${JUICEFS_SECRET_NAME}
                  key: name
            - name: JUICEFS_META_URL
              valueFrom:
                secretKeyRef:
                  name: ${JUICEFS_SECRET_NAME}
                  key: metaurl
            - name: JUICEFS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: ${JUICEFS_SECRET_NAME}
                  key: bucket
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ${JUICEFS_SECRET_NAME}
                  key: access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ${JUICEFS_SECRET_NAME}
                  key: secret-key
          command:
            - /bin/sh
            - -ceu
            - |
              : "${JUICEFS_VOLUME_NAME:?}"
              : "${JUICEFS_META_URL:?}"
              : "${JUICEFS_BUCKET:?}"
              : "${S3_ACCESS_KEY:?}"
              : "${S3_SECRET_KEY:?}"

              safe_meta_url() {
                case "$JUICEFS_META_URL" in
                  postgres://*)
                    scheme="postgres"
                    rest="${JUICEFS_META_URL#postgres://}"
                    ;;
                  postgresql://*)
                    scheme="postgres"
                    rest="${JUICEFS_META_URL#postgresql://}"
                    ;;
                  *)
                    printf 'agentsmith-lite-juicefs-format: unsupported metadata URL scheme\n' >&2
                    exit 2
                    ;;
                esac
                case "$rest" in
                  *@*) ;;
                  *)
                    printf 'agentsmith-lite-juicefs-format: metadata URL must include userinfo\n' >&2
                    exit 2
                    ;;
                esac
                userinfo="${rest%@*}"
                hostpath="${rest##*@}"
                user="${userinfo%%:*}"
                password="${userinfo#*:}"
                if [ -z "$user" ] || [ "$password" = "$userinfo" ] || [ -z "$password" ]; then
                  printf 'agentsmith-lite-juicefs-format: metadata URL must include username and password\n' >&2
                  exit 2
                fi
                META_PASSWORD="$password"
                export META_PASSWORD
                printf '%s://%s@%s\n' "$scheme" "$user" "$hostpath"
              }

              json_string_value() {
                key="$1"
                awk -v key="$key" '
                  $0 ~ "\"" key "\":" {
                    line=$0
                    sub(".*\"" key "\":[[:space:]]*\"", "", line)
                    sub("\"[,[:space:]]*$", "", line)
                    print line
                    found=1
                    exit
                  }
                  END { if (!found) exit 1 }
                '
              }

              meta_url="$(safe_meta_url)"
              format_log="$(mktemp)"
              config_log="$(mktemp)"
              trap 'rm -f "$format_log" "$config_log"' EXIT

              if ! ACCESS_KEY="$S3_ACCESS_KEY" \
                SECRET_KEY="$S3_SECRET_KEY" \
                JFS_NO_CHECK_OBJECT_STORAGE=1 \
                juicefs format \
                  --no-update \
                  --storage s3 \
                  --bucket "$JUICEFS_BUCKET" \
                  "$meta_url" \
                  "$JUICEFS_VOLUME_NAME" >"$format_log" 2>&1; then
                printf 'agentsmith-lite-juicefs-format: juicefs format failed\n' >&2
                exit 1
              fi

              if ! current_config="$(juicefs config "$meta_url" 2>"$config_log")"; then
                printf 'agentsmith-lite-juicefs-format: unable to read JuiceFS volume config\n' >&2
                exit 1
              fi
              current_name="$(printf '%s\n' "$current_config" | json_string_value Name)"
              current_storage="$(printf '%s\n' "$current_config" | json_string_value Storage | tr '[:upper:]' '[:lower:]')"
              current_bucket="$(printf '%s\n' "$current_config" | json_string_value Bucket)"

              if [ "$current_name" != "$JUICEFS_VOLUME_NAME" ]; then
                printf 'agentsmith-lite-juicefs-format: existing JuiceFS volume mismatch: name\n' >&2
                exit 2
              fi
              if [ "$current_storage" != "s3" ]; then
                printf 'agentsmith-lite-juicefs-format: existing JuiceFS volume mismatch: storage\n' >&2
                exit 2
              fi
              if [ "$current_bucket" != "$JUICEFS_BUCKET" ]; then
                printf 'agentsmith-lite-juicefs-format: existing JuiceFS volume mismatch: bucket\n' >&2
                exit 2
              fi
              printf 'agentsmith-lite-juicefs-format: ok\n'
