apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: agentsmith
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
  selector:
    app.kubernetes.io/name: minio
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: agentsmith
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2026-06-13T11-33-47Z
          args: ["server", "/data"]
          ports:
            - containerPort: 9000
              name: api
          startupProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            failureThreshold: 3
            periodSeconds: 5
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-minio
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-minio
                  key: secret-key
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
