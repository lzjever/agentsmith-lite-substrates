apiVersion: batch/v1
kind: Job
metadata:
  name: agentsmith-lite-minio-bucket-init
  namespace: ${KUBE_NAMESPACE}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-bucket-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bucket-init
          image: ${MINIO_CLIENT_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: S3_ENDPOINT
              value: "${S3_ENDPOINT}"
            - name: S3_BUCKET
              value: "${S3_BUCKET}"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-minio
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentsmith-lite-minio
                  key: secret-key
          command:
            - /bin/sh
            - -ceu
            - |
              mc alias set agentsmith-minio "$S3_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" --api S3v4 >/dev/null

              attempt=0
              while [ "${attempt}" -lt 30 ]; do
                if mc mb --ignore-existing "agentsmith-minio/$S3_BUCKET" >/dev/null \
                  && mc stat "agentsmith-minio/$S3_BUCKET" >/dev/null; then
                  printf 'minio bucket ready\n'
                  exit 0
                fi
                attempt=$((attempt + 1))
                sleep 2
              done

              printf 'minio bucket init failed\n' >&2
              mc stat "agentsmith-minio/$S3_BUCKET" >&2 || true
              exit 1
